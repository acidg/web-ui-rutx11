<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a84ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="RUTX11">
  <title>RUTX11</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login -->
  <div id="screen-login" class="screen">
    <div class="login-box">
      <div class="logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <rect width="48" height="48" rx="12" fill="var(--accent)"/>
          <path d="M10 30 Q24 12 38 30" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <path d="M15 34 Q24 20 33 34" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <circle cx="24" cy="38" r="3" fill="white"/>
        </svg>
        <span>RUTX11</span>
      </div>
      <p id="login-message" class="message hidden"></p>
      <form id="login-form" autocomplete="on" novalidate>
        <label for="input-password">Router password</label>
        <input id="input-password" type="password" autocomplete="current-password"
               placeholder="admin password" required>
        <button type="submit" id="btn-login">Sign in</button>
      </form>
    </div>
  </div>

  <!-- Status -->
  <div id="screen-status" class="screen hidden">
    <header><h1>Status</h1></header>
    <main id="status-content">
      <p class="placeholder">Loading…</p>
    </main>
  </div>

  <!-- Add WiFi -->
  <div id="screen-add" class="screen hidden">
    <header class="header-with-back">
      <button class="btn-back" id="btn-back-add" aria-label="Back">&#8592; Back</button>
      <h1>Add WiFi uplink</h1>
    </header>
    <main id="add-content">
      <p class="placeholder">Coming in Phase 4</p>
    </main>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
